mode: full
seed: 42
device: cuda
mlflow:
  tracking_uri: sqlite:///mlflow.db
  experiment_name: project21_textclf
paths:
  artifact_dir: artifacts
  report_dir: reports
  cache_dir: .cache

datasets:
  primary: setfit_20_newsgroups
  additional:
    - ag_news
    - imdb
  validation_size: 0.1
  test_size: 0.2

models:
  required:
    - distilbert
    - bert_base
    - roberta_base
    - deberta_v3_base
    - modernbert
  optional:
    - minilm
  strategies:
    distilbert: full
    bert_base: full
    roberta_base: lora
    deberta_v3_base: lora
    modernbert: lora

training:
  epochs: 3
  learning_rate: 2.0e-5
  weight_decay: 0.01
  train_batch_size: 16
  eval_batch_size: 32
  gradient_accumulation_steps: 1
  warmup_ratio: 0.06
  max_length: 256
  gradient_checkpointing: true
  fp16: true
  early_stopping_patience: 2
  save_total_limit: 2
  metric_for_best_model: eval_macro_f1

hpo:
  enabled: true
  n_trials: 20
  timeout_sec: 43200

optimization:
  export_onnx: true
  dynamic_quantization: true
  opset: 17

serving:
  host: 0.0.0.0
  port: 8000
  top_k: 3
  model_cache_size: 2048

notebook:
  mode: full
  run_benchmarks: true
