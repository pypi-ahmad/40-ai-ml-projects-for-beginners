models:
  primary_llm: qwen3.5:4b
  judge_llm: granite4.1:3b
  embedding_default: BAAI/bge-small-en-v1.5
  embedding_candidates:
    - BAAI/bge-small-en-v1.5
    - all-MiniLM-L6-v2
    - nomic-embed-text
  reranker_model: BAAI/bge-reranker-base
  ocr_model: glm-ocr:latest

runtime:
  profile: quickstart
  gpu_optimized: true
  seed: 42

paths:
  data_dir: data
  documents_dir: data/documents
  notes_dir: data/notes
  eval_dir: data/eval
  web_cache_dir: data/web_cache
  vector_db_dir: vectordb/chroma
  manifest_path: vectordb/index_manifest.json
  outputs_dir: outputs
  logs_dir: outputs/logs

indexing:
  collection_name: hybrid_research_assistant
  namespace: default
  incremental: true
  deduplicate_chunks: true
  normalize_embeddings: true
  embedding_batch_size: 32

chunking:
  strategy_default: recursive
  chunk_size_default: 768
  chunk_overlap_default: 100
  chunk_sizes: [256, 512, 768, 1024]
  chunk_overlaps: [0, 50, 100, 200]
  token_chunk_size_default: 512

retrieval:
  top_k_default: 5
  candidate_k_default: 20
  mmr_lambda: 0.5
  similarity_threshold: 0.25
  route_auto: true

web_search:
  provider_default: duckduckgo
  providers_enabled: [duckduckgo, tavily, brave]
  max_results: 8
  timeout_seconds: 5
  retry_attempts: 3
  cache_ttl_seconds: 900
  freshness_days: 7

memory:
  max_turns: 20
  summary_trigger_turns: 12
  summary_max_tokens: 256

cache:
  semantic_enabled: true
  semantic_similarity_threshold: 0.92
  semantic_ttl_seconds: 1800
  response_ttl_local_seconds: 3600
  response_ttl_web_seconds: 600

generation:
  temperature: 0.1
  max_tokens: 800
  grounded_fallback: "I don't know based on the retrieved information."

evaluation:
  benchmark_path: data/eval/benchmark_questions.jsonl
  reports_dir: outputs/reports

ui:
  page_title: Hybrid Real-Time AI Research Assistant
  dark_mode_default: true
