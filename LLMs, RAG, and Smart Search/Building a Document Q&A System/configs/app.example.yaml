# Optional reference config (runtime uses env vars via pydantic-settings)
ollama_host: http://127.0.0.1:11434
embedding_model: qwen3-embedding:4b
generation_model: qwen3.5:4b
judge_model: granite4.1:3b
collection_name: enterprise_document_qa
documents_dir: data/documents
quickstart_documents_dir: data/documents_quickstart
quickstart_seed_documents_dir: data/documents_curated
corpus_profile: full
generation_streaming_default: true
chunking:
  default_chunk_size: 768
  default_chunk_overlap: 100
  chunk_sizes: [256, 512, 768, 1024, 1500]
  chunk_overlaps: [0, 50, 100, 200]
retrieval:
  default_k: 5
  candidate_ks: [1, 3, 5, 10]
  default_strategy: hybrid
  hybrid_rrf_k: 60
  hybrid_vector_weight: 0.55
prompts:
  default_template: enterprise_qa
  strict_grounding: true
  unavailable_response: Information unavailable in provided context.
  citation_instruction: Cite every factual claim using [source_path#chunk_id].
