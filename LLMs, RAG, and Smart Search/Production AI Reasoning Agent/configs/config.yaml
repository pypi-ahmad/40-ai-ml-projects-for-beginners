app:
  name: production-ai-reasoning-agent
  environment: local
  trace_visibility: safe_summary

models:
  primary: qwen3:8b
  compare:
    - llama3.1:8b
    - granite4.1:3b
    - deepseek-r1
  embedding: qwen3-embedding:4b
  temperature: 0.1
  max_tokens: 1200

graph:
  max_iterations: 8
  max_retries: 2
  timeout_seconds: 30
  enable_reflection: true

memory:
  chroma_dir: artifacts/chroma
  retention_days: 30
  top_k: 5

tools:
  allow_network: true
  enabled:
    - calculator
    - duckduckgo_search
    - wikipedia
    - python_repl
    - datetime
    - unit_converter
    - currency_converter
    - weather
    - file_reader
    - csv_analyzer
    - json_explorer
    - webpage_reader
    - markdown_reader
    - document_search
    - semantic_search
    - vector_search
    - local_rag

logging:
  dir: logs
  level: INFO
  json: true

benchmark:
  dataset_path: benchmarks/prompts.jsonl
  full_mode_only: true
  output_dir: artifacts/reports
