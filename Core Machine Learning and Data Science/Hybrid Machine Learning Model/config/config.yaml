data:
  path: "data/apple_stock_data.csv"
  train_end: "2018-12-31"
  val_end: "2019-12-31"
  date_col: "Date"
  close_proxy: "Close"

features:
  lags: [1, 3, 5, 10, 20, 60]
  rolling_windows: [5, 10, 20, 50, 100]
  ema_windows: [5, 10, 20, 50]
  wma_windows: [5, 10, 20]
  momentum_windows: [5, 10, 20]
  volatility_windows: [5, 10, 20, 50]
  include_technical: true
  include_date_features: true
  include_price_derived: true
  target_col: "Close"
  horizons: [1, 5, 10, 30]
  dropna: true
  scale_for_deep_learning: true

models:
  baselines:
    [
      "Naive Forecast",
      "Moving Average",
      "Linear Regression",
      "Ridge Regression",
      "Random Forest",
      "Extra Trees",
      "XGBoost",
      "LightGBM",
      "CatBoost",
      "SVR",
      "KNN Regressor",
    ]
  random_state: 42
  n_jobs: -1
  automl:
    lazypredict: true
    pycaret: true
    flaml: true
    pycaret_time_budget_s: 60
    flaml_time_budget_s: 60
    flaml_metric: "rmse"
  xgboost:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.85
    colsample_bytree: 0.85
  lightgbm:
    n_estimators: 400
    max_depth: -1
    num_leaves: 31
    learning_rate: 0.05
  catboost:
    iterations: 400
    depth: 6
    learning_rate: 0.05
    verbose: false
  deep_learning:
    sequence_length: 30
    hidden_size: 64
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 64
    epochs: 25
    early_stopping_patience: 5
    architectures:
      [
        "vanilla_lstm",
        "stacked_lstm",
        "bidirectional_lstm",
        "gru",
        "cnn_lstm",
        "tcn",
      ]
  hybrid:
    methods:
      [
        "linear_plus_lstm",
        "rf_plus_lstm",
        "xgb_plus_gru",
        "lgbm_plus_lstm",
        "stacking_ensemble",
        "weighted_ensemble",
        "meta_learner",
      ]

backtesting:
  strategies: ["walk_forward", "expanding", "rolling"]
  n_splits: 5
  min_train_size: 0.55
  test_size: 0.1
  rolling_window_size: 0.6

weight_optimization:
  method: "grid"
  methods: ["grid", "bayesian", "flaml"]
  step: 0.05
  metric: "rmse"
  bayesian_calls: 80
  flaml_budget_s: 120

visualization:
  output_dir: "outputs/plots"
  dpi: 150
  style: "seaborn-v0_8-darkgrid"

runtime:
  seed: 42
  portfolio_mode: "realistic"
  cpu_only: true

paths:
  artifacts_dir: "outputs/artifacts"
  tables_dir: "outputs/tables"
  predictions_dir: "outputs/predictions"
  models_dir: "outputs/models"
