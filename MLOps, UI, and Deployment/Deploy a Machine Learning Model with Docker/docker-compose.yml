services:
  ml-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.optimized
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - LOG_LEVEL=INFO
      - RATE_LIMIT_DEFAULT=${RATE_LIMIT_DEFAULT:-120/minute}
      - RATE_LIMIT_PREDICT=${RATE_LIMIT_PREDICT:-60/minute}
      - RATE_LIMIT_BATCH=${RATE_LIMIT_BATCH:-30/minute}
      - RATE_LIMIT_EXPLAIN=${RATE_LIMIT_EXPLAIN:-20/minute}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - mlops-net

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      ml-api:
        condition: service_healthy
    networks:
      - mlops-net

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - mlops-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  mlops-net:
    driver: bridge
