version: "3.9"

services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -lc "uv sync && uv run uvicorn peft_platform.api.app:create_app --factory --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  streamlit:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -lc "uv sync && uv run streamlit run src/peft_platform/ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow-artifacts
    volumes:
      - ../artifacts/mlflow:/mlflow-artifacts
    ports:
      - "5000:5000"
