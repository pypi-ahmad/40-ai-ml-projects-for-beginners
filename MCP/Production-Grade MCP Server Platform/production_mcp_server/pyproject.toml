[project]
name = "production-mcp-server-platform"
version = "0.1.0"
description = "Production-grade MCP server platform with dual runtimes, FastAPI bridge, Streamlit UI, LangGraph workflows, and persistent memory"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
  "apscheduler>=3.10.4",
  "chromadb>=1.0.15",
  "fastapi>=0.116.1",
  "fastmcp>=3.2.4",
  "httpx>=0.28.1",
  "hydra-core>=1.3.2",
  "langchain>=0.3.27",
  "langchain-ollama>=0.3.6",
  "langgraph>=0.6.0",
  "loguru>=0.7.3",
  "mcp>=1.12.4",
  "mlflow>=3.1.4",
  "plotly>=6.2.0",
  "pydantic>=2.11.7",
  "pydantic-settings>=2.10.1",
  "pyyaml>=6.0.2",
  "rich>=14.0.0",
  "sentence-transformers>=5.0.0",
  "sqlalchemy>=2.0.41",
  "streamlit>=1.46.1",
  "typer>=0.16.0",
  "uvicorn>=0.35.0",
  "duckduckgo-search>=8.1.1",
  "psutil>=6.1.1",
  "reportlab>=4.4.2",
]

[dependency-groups]
dev = [
  "ipykernel>=6.29.5",
  "jupyter>=1.1.1",
  "pytest>=8.4.1",
  "pytest-asyncio>=1.0.0",
  "pytest-cov>=6.2.1",
  "ruff>=0.12.1",
]

[project.scripts]
mcp-server = "cli.main:app"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["src/tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
extend-exclude = ["notebook/*.ipynb"]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
  "src/server",
  "src/tools",
  "src/prompts",
  "src/resources",
  "src/memory",
  "src/workflows",
  "src/auth",
  "src/config",
  "src/monitoring",
  "src/api",
  "src/ui",
  "src/cli",
  "src/utils",
]
