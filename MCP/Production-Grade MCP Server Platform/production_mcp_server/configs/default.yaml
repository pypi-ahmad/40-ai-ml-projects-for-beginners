app:
  name: "production-mcp-server"
  environment: "dev"

models:
  backend: "ollama"
  base_url: "http://127.0.0.1:11434"
  default_model: "qwen3:8b"
  supported_models:
    - "llama3:8b"
    - "qwen3:8b"
    - "gemma3:4b"
    - "deepseek-r1:8b"
    - "phi4-mini:latest"
    - "mistral:7b"

transport:
  runtime: "fastmcp"
  mode: "stdio"
  host: "127.0.0.1"
  port: 8001
  sse_path: "/events"
  http_path: "/mcp"

auth:
  enabled: true
  read_only_mode: false
  api_keys:
    local-admin: "admin"
    local-user: "user"
    local-readonly: "read_only"

cache:
  enabled: true
  ttl_seconds: 900

memory:
  sqlite_path: "database/memory.db"
  chroma_path: "chroma_db"
  chroma_enabled: true
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 5

plugins:
  enabled: true
  directory: "plugins"
  allowlist_manifest: "configs/plugins_allowlist.yaml"

logging:
  level: "INFO"
  json_logs: true
  file_path: "logs/server.log"

monitoring:
  enabled: true
  sample_interval_seconds: 5
  mlflow_tracking_uri: "sqlite:///database/mlflow.db"

scheduler:
  enabled: true
  timezone: "UTC"
  index_every_minutes: 30
  cleanup_every_minutes: 60
  report_every_minutes: 120

shell:
  whitelist:
    - "ls"
    - "pwd"
    - "head"
    - "tail"
    - "wc"
    - "cat"

external:
  news_api_key_env: "NEWS_API_KEY"
  github_token_env: "GITHUB_TOKEN"
