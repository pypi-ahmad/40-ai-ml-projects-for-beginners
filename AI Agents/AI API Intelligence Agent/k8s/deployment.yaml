apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api-intel-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-api-intel-agent
  template:
    metadata:
      labels:
        app: ai-api-intel-agent
    spec:
      containers:
        - name: api
          image: ai-api-intel-agent:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-api-intel-agent-secrets
            - configMapRef:
                name: ai-api-intel-agent-config
