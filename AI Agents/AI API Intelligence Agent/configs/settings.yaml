app:
  name: "AI API Intelligence Agent"
  environment: "dev"
  timezone: "UTC"

llm:
  base_url: "http://127.0.0.1:11434"
  default_model: "qwen3:8b"
  temperature: 0.2
  max_tokens: 1024
  timeout_seconds: 30
  supported_models:
    llama3: "llama3.1:8b"
    qwen3: "qwen3:8b"
    gemma3: "gemma3:4b"
    deepseek: "deepseek-r1:8b"
    phi4mini: "phi4-mini:3.8b"
    mistral: "mistral:7b"

agent:
  max_iterations: 6
  max_parallel_calls: 4
  retry_max_attempts: 3
  retry_backoff_seconds: 1.5
  default_output_format: "markdown"

auth:
  jwt_secret_env: "AGENT_JWT_SECRET"
  jwt_algorithm: "HS256"
  access_token_minutes: 30
  refresh_token_minutes: 1440

cache:
  enabled: true
  backend: "sqlite"
  sqlite_path: "artifacts/cache/cache.db"
  redis_url: ""
  default_ttl_seconds: 900

memory:
  sqlite_path: "artifacts/memory/agent_memory.db"
  chroma_enabled: true
  chroma_path: "artifacts/memory/chroma"
  embedding_model: "all-MiniLM-L6-v2"
  top_k: 5

apis:
  github:
    base_url: "https://api.github.com"
    auth_env: "GITHUB_TOKEN"
  huggingface:
    base_url: "https://huggingface.co/api"
    auth_env: "HUGGINGFACE_TOKEN"
  stackoverflow:
    base_url: "https://api.stackexchange.com/2.3"
    auth_env: ""
  reddit:
    base_url: "https://www.reddit.com"
    auth_env: "REDDIT_BEARER_TOKEN"
  news:
    base_url: "https://newsapi.org/v2"
    auth_env: "NEWS_API_KEY"
  openlibrary:
    base_url: "https://openlibrary.org"
    auth_env: ""
  weather:
    base_url: "https://api.open-meteo.com/v1"
    auth_env: ""
  exchange_rate:
    base_url: "https://api.exchangerate.host"
    auth_env: ""
  coingecko:
    base_url: "https://api.coingecko.com/api/v3"
    auth_env: ""
  nasa:
    base_url: "https://api.nasa.gov"
    auth_env: "NASA_API_KEY"
  restcountries:
    base_url: "https://restcountries.com/v3.1"
    auth_env: ""
  holidays:
    base_url: "https://date.nager.at/api/v3"
    auth_env: ""
  jsonplaceholder:
    base_url: "https://jsonplaceholder.typicode.com"
    auth_env: ""
  jira:
    base_url: "https://your-domain.atlassian.net"
    auth_env: "JIRA_API_TOKEN"
  gitlab:
    base_url: "https://gitlab.com/api/v4"
    auth_env: "GITLAB_TOKEN"
  notion:
    base_url: "https://api.notion.com/v1"
    auth_env: "NOTION_TOKEN"
  google_sheets:
    base_url: "https://sheets.googleapis.com/v4"
    auth_env: "GOOGLE_SHEETS_TOKEN"
  slack:
    base_url: "https://slack.com/api"
    auth_env: "SLACK_BOT_TOKEN"
  gmail:
    base_url: "https://gmail.googleapis.com/gmail/v1"
    auth_env: "GMAIL_TOKEN"

monitoring:
  metrics_enabled: true
  collect_gpu: true
  export_prometheus: false

scheduler:
  enabled: true
  report_cron: "0 */6 * * *"

ui:
  streamlit_title: "AI API Intelligence Dashboard"
  dark_mode_default: true

reports:
  output_dir: "artifacts/reports"
  include_charts: true
  include_sources: true
